<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">
    <style>
        .container{
            border-radius: 15px;
            font-family: Electrolize;
        }
        .other-container{
            border-radius: 15px;
        }
        body{
            background-image: url("https://cdn.wallpapersafari.com/64/66/DQjwep.jpg"); background-size:cover;
            background-repeat:no-repeat;
        }
    </style>
</head>
<body>
    <div class="container bg-dark text-center">
        <div class="other-container bg-light">
            <h1>Electricity Consumption Classifier</h1>
        </div>
    <form>
        <label for="electricity" style="color:aliceblue">kWh:</label>
        <input type ="text" id="electricity" class="form-control" placeholder="Enter Number">
        <button type="submit" id="btn_electricity" class="btn btn-info" onclick="checkElectricity()">Consumption Classification</button>
    </form>
    </div>

    <script>
        function checkElectricity(){
            let electricity = document.getElementById("electricity").value;
        if(isNaN(electricity) || electricity < 0 ){
            alert("Please enter a valid input.");
        } 
        else if (electricity <= 100){
            alert("Lifeline Consumer: You use little to no electricity");
        }
        else if(electricity <= 200){
            alert("Low Consumption: You use the average amount of electricity");
        }
        else if(electricity <= 300){
            alert("Average Consumption: You use a typical amount of electricity");
        }
        else if(electricity <= 500){
            alert("High Consumption: You use a high amount of electricity");
        }
        else if(electricity >= 500){
            alert("Very High Consumption: You use too much electricity");
        }
        }
    </script>
    
</body>
</html>
